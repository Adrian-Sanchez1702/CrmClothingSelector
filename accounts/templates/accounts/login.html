{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login y registro</title>
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
</head>
<body>

    <main>

        <div class="contenedor__todo">

            <div class="caja__trasera">

                <div class="caja__trasera-login">
                    <h3>¿Ya tienes una cuenta?</h3>
                    <p> Inicia sesion para poder ingresar a la página</p>
                        <button id="btn__iniciar-sesion">Iniciar sesión</button>
                </div>
                <div class="caja__trasera-register">
                    <h3>¿Aún no tienes una cuenta?</h3>
                    <p> Registrate para que puedas iniciar sesión</p>
                        <button id="btn__registrarse">Regristrarse</button>
                </div>

            </div>

            <!--Formulario de login y registro-->
            <div class="contenedor__login-registrer">

                <form action="{% url 'login' %}" method="POST" class="formulario__login">
                    {% csrf_token %}
                    <h2>Iniciar sesión</h2>
                    <input type="text" name="username" placeholder="Usuario" required>
                    <input type="password" name="password" placeholder="Contraseña" required>
                    <button>Entrar</button>

                </form>

                <form action="{% url 'register' %}" method="POST" class="formulario__register">
                    {% csrf_token %}
                    <h2>Regristrarse</h2>
                    <input type="text"  name="username" placeholder="Usuario" required>
                    <input type="password" name="password" placeholder="Contraseña" required>
                    <button>Regristrarse</button>

                </form>

            </div>

        </div>

    </main>
    <script src="{% static 'accounts/js/login.js' %}"></script>

</body>
</html>
