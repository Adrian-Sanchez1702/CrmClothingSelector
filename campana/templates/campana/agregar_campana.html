{% load static %}

{% block extrastyle %}
<style>

/* FONDO */
body {
  background: linear-gradient(135deg, #1a1a1a, #3b3b3b);
  min-height: 100vh;
  font-family: Arial, sans-serif;
}

/* CONTENEDOR */
.contenedor {
  max-width: 850px;
  margin: 60px auto;
  background: linear-gradient(135deg, #2a2a2a, #404040);
  border-radius: 14px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.45);
  color: #fff;
}

/* HEADER */
.contenedor-header {
  text-align: center;
  padding: 22px 20px 8px;
}

.contenedor-header h5 {
  font-size: 1.8rem;
  font-weight: 600;
  color: #ffffff;
}

/* BODY */
.contenedor-body {
  padding: 22px 32px 30px;
}

/* TITULOS */
.section-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: #ff3b3b;
  text-transform: uppercase;
  margin: 20px 0 10px;
  border-bottom: 1px solid rgba(255,59,59,0.6);
  padding-bottom: 5px;
}

/* FILAS */
.fila {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}

/* CAMPOS */
.campo {
  flex: 1;
}

.campo label {
  font-size: 0.75rem;
  color: #e0e0e0;
  margin-bottom: 3px;
  display: block;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  border-radius: 6px;
  border: none;
  padding: 8px 6px;
  background: #ffffff;
  color: #222;
  font-size: 0.9rem;
  font-family: Arial, sans-serif;
}

select {
  height: 33px;
}

/* TEXTAREA */
textarea {
  min-height: 50px;
  resize: none;
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(255,59,59,0.7);
}

/* BOTON GUARDAR */
.boton-guardar {
  background: #ff3b3b;
  border: none;
  border-radius: 18px;
  height: 32px;
  padding: 0 36px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: 0.2s ease-in-out;

  width: auto; /* 🔥 evita que se haga gigante */
}

.boton-guardar:hover {
  background: #e63232;
}

/* BOTON CANCELAR */

.boton-cancelar {
  background: #6c757d;
  border-radius: 18px;
  height: 32px;
  padding: 0 28px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  text-decoration: none;
  transition: 0.2s;
}

.boton-cancelar:hover {
  background: #5a6268;
}

/* CONTENEDOR BOTONES */

.footer-boton {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
}

@media (max-width: 768px) {

  .fila {
    flex-direction: column;
  }

  .contenedor {
    margin: 20px;
  }

}

</style>
{% endblock %}


{% block content %}

<div class="contenedor">

  <div class="contenedor-header">
    <h5>Crear Campaña</h5>
  </div>

  <div class="contenedor-body">

    <form method="POST">
      {% csrf_token %}

      <!-- INFORMACIÓN DE CAMPAÑA -->

      <div class="section-title">
        Información de Campaña
      </div>

      <div class="fila">

        <div class="campo">
          <label>Nombre de la Campaña:</label>
          <input type="text" name="nombre" required>
        </div>

        <div class="campo">

          <label>Público Objetivo:</label>

          <select name="publico_obj" required>

            <option value="">Selecciona</option>

            <option value="Hombre">
              Hombre
            </option>

            <option value="Mujer">
              Mujer
            </option>

            <option value="Niño">
              Niño
            </option>

          </select>

        </div>

      </div>

      <div class="fila">

        <div class="campo">
          <label>Mensaje de la Campaña:</label>

          <textarea name="mensaje" required></textarea>

        </div>

      </div>

      <!-- ESTADO -->

      <div class="section-title">
        Estado
      </div>

      <div class="fila">

        <div class="campo">

          <label>Estado de la Campaña:</label>

          <select name="estado" required>

            <option value="">Selecciona</option>

            <option value="Activa">
              Activa
            </option>

            <option value="Inactiva">
              Inactiva
            </option>

          </select>

        </div>

      </div>

      <!-- BOTONES -->

      <div class="footer-boton">

        <a href="{% url 'listar_campanas' %}" class="boton-cancelar">
          Cancelar
        </a>

        <input 
        type="submit"
        value="Guardar Campaña"
        class="boton-guardar">

      </div>

    </form>

  </div>

</div>

{% endblock %}
