{% load static %}

{% block extrastyle %}
<style>

body {
  background: linear-gradient(135deg, #1a1a1a, #3b3b3b);
  min-height: 100vh;
  font-family: Arial, sans-serif;
}

.contenedor {
  max-width: 850px;
  margin: 60px auto;
  background: linear-gradient(135deg, #2a2a2a, #404040);
  border-radius: 14px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.45);
  color: #fff;
}

.contenedor-header {
  text-align: center;
  padding: 22px 20px 8px;
}

.contenedor-header h5 {
  font-size: 1.8rem;
  font-weight: 600;
  color: #ffffff;
}

.contenedor-body {
  padding: 22px 32px 30px;
}

.section-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: #ff3b3b;
  text-transform: uppercase;
  margin: 20px 0 10px;
  border-bottom: 1px solid rgba(255,59,59,0.6);
  padding-bottom: 5px;
}

.fila {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}

.campo {
  flex: 1;
}

.campo label {
  font-size: 0.75rem;
  color: #e0e0e0;
  margin-bottom: 3px;
  display: block;
}

input, select, textarea {
  width: 100%;
  border-radius: 6px;
  border: none;
  padding: 8px 6px;
  background: #ffffff;
  color: #222;
  font-size: 0.9rem;
  font-family: Arial, sans-serif;
}

select {
  height: 33px;
}

textarea {
  min-height: 50px;
  resize: none;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  box-shadow: 0 0 0 2px rgba(255,59,59,0.7);
}

/* BOTON ACTUALIZAR */

.boton-guardar {
  background: #ff3b3b;
  border: none;
  border-radius: 18px;
  height: 32px;
  padding: 0 36px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  cursor: pointer;

  width: auto;   /* 🔴 SOLUCION */
}

.boton-guardar:hover {
  background: #e63232;
}

/* BOTON CANCELAR */

.boton-cancelar {
  background: #6c757d;
  border-radius: 18px;
  height: 32px;
  padding: 0 28px;
  font-size: 0.8rem;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  text-decoration: none;
  transition: 0.2s;
}

.boton-cancelar:hover {
  background: #5a6268;
}

/* CONTENEDOR BOTONES */

.footer-boton {
  display: flex;
  justify-content: center;
  gap: 14px;  /* espacio entre botones */
  margin-top: 20px;
}

</style>
{% endblock %}


{% block content %}

<div class="contenedor">

  <div class="contenedor-header">
    <h5>Editar Campaña</h5>
  </div>

  <div class="contenedor-body">

    <form method="POST">
      {% csrf_token %}

      <div class="section-title">
        Información de Campaña
      </div>

      <div class="fila">

        <div class="campo">
          <label>Nombre de la Campaña:</label>

          <input 
          type="text"
          name="nombre"
          value="{{ campana.nombre }}"
          required>

        </div>

        <div class="campo">

          <label>Público Objetivo:</label>

          <select name="publico_obj" required>

            <option value="Hombre" {% if campana.publico_obj == "Hombre" %}selected{% endif %}>
              Hombre
            </option>

            <option value="Mujer" {% if campana.publico_obj == "Mujer" %}selected{% endif %}>
              Mujer
            </option>

            <option value="Niño" {% if campana.publico_obj == "Niño" %}selected{% endif %}>
              Niño
            </option>

          </select>

        </div>

      </div>

      <div class="fila">

        <div class="campo">

          <label>Mensaje de la Campaña:</label>

          <textarea name="mensaje" required>{{ campana.mensaje }}</textarea>

        </div>

      </div>

      <div class="section-title">
        Estado
      </div>

      <div class="fila">

        <div class="campo">

          <label>Estado de la Campaña:</label>

          <select name="estado" required>

            <option value="Activa" {% if campana.estado == "Activa" %}selected{% endif %}>
              Activa
            </option>

            <option value="Inactiva" {% if campana.estado == "Inactiva" %}selected{% endif %}>
              Inactiva
            </option>

          </select>

        </div>

      </div>

      <!-- BOTONES -->

      <div class="footer-boton">

        <a href="{% url 'listar_campanas' %}" class="boton-cancelar">
            Cancelar
        </a>

        <input
        type="submit"
        value="Actualizar Campaña"
        class="boton-guardar">

      </div>

    </form>

  </div>

</div>

{% endblock %}
