{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>CRM</title>

<style>

/* RESET */

body{
margin:0;
font-family:Arial;
background: linear-gradient(135deg,#1a1a1a,#3b3b3b);
color:white;
min-height:100vh;
}

/* BOTON HAMBURGUESA */

.hamburguesa{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
color:white;
z-index:1001;
}

/* MENU LATERAL */

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#ff3b3b;
transition:0.3s;
padding-top:70px;
box-shadow:5px 0 20px rgba(0,0,0,0.4);
z-index:1000;
}

/* LINKS MENU */

.menu a{
display:block;
color:white;
padding:15px 25px;
text-decoration:none;
font-size:15px;
}

.menu a:hover{
background:#e63232;
}

/* BOTON CERRAR SESION */

.cerrar{
position:absolute;
bottom:80px;
width:100%;
text-align:center;
}

.cerrar a{
background:#3498db;
color:#FFFFFF;
font-weight:bold;
padding:8px 18px;
display:inline-block;
border-radius:6px;
text-decoration:none;
}

/* CONTENIDO GENERAL */

.contenido{
max-width:1100px;
margin:60px auto;
padding:20px;
}

</style>

<!-- CSS EXTRA DE CADA PAGINA -->
{% block extrastyle %}
{% endblock %}

</head>

<body>

<!-- BOTON HAMBURGUESA -->

<div class="hamburguesa" onclick="toggleMenu()">
☰
</div>

<!-- MENU LATERAL -->

<div id="menu" class="menu">

<a href="{% url 'actualizar_info' %}">Actualizar información personal</a>

<a href="{% url 'lista_favoritos' %}">Favoritos</a>

<a href="{% url 'lista_catalogo' %}">Catálogo</a>

<a href="{% url 'listar_campanas' %}">Campañas</a>

<a href="{% url 'lista_leads' %}">Leads</a>

<a href="{% url 'analisis' %}">Análisis</a>

<div class="cerrar">
  <a href="{% url 'logout' %}">
    Cerrar sesión
  </a>
</div>

</div>

<!-- CONTENIDO DE CADA PAGINA -->

<div class="contenido">

{% block content %}
{% endblock %}

</div>

<script>

function toggleMenu(){

let menu = document.getElementById("menu");

if(menu.style.left === "0px"){
menu.style.left = "-260px";
}else{
menu.style.left = "0px";
}

}

</script>

</body>
</html>
